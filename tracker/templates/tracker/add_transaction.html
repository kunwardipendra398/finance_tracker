{% extends 'tracker/base.html' %}
{% load i18n %}
{% block title %}{% trans "Add Transaction" %}{% endblock %}

{% block content %}
<h1>{% trans "Add Transaction" %}</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% trans "Submit" %}</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">{% trans "Back" %}</a>
</form>
{% endblock %}
