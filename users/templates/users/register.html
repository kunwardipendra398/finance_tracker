{% extends 'tracker/base.html' %}
{% load i18n %}
{% block title %}{% trans "Register" %}{% endblock %}
{% block content %}
<h2>{% trans "Register" %}</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    {{ profile_form.as_p }}
    <button type="submit" class="btn btn-primary">{% trans "Register" %}</button>
</form>
{% endblock %}
